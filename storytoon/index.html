<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>StoryToon 🌸</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 앱 래퍼 -->
  <div id="app">

    <!-- 스플래시 스크린 -->
    <div id="splash-screen" class="splash">
      <div class="splash-logo">🌸</div>
      <div class="splash-title">StoryToon</div>
      <div class="splash-subtitle">우리 가족의 이야기를 만화로</div>
    </div>

    <!-- 메인 화면 -->
    <div id="main-screen" class="screen hidden">

      <!-- 상단 헤더 -->
      <header class="app-header">
        <div class="header-logo">🌸 StoryToon</div>
        <button class="btn-icon" id="btn-my-toots">
          <span>📚</span>
        </button>
      </header>

      <!-- 히어로 섹션 -->
      <section class="hero-section">
        <h1 class="hero-title">우리 가족의 이야기를<br><span class="highlight">만화로 만들어드려요</span></h1>
        <p class="hero-desc">소중한 순간을 입력하면 AI가 감동적인 만화로 만들어 드립니다</p>
      </section>

      <!-- 스토리 입력 카드 -->
      <section class="input-section">
        <div class="card input-card">
          <div class="card-label">📝 어떤 이야기를 만화로 만들까요?</div>
          <textarea
            id="story-input"
            class="story-textarea"
            placeholder="예) 첫 만남부터 결혼까지 우리 이야기, 아이가 처음 말을 했을 때, 부모님의 오래된 사진을 발견했을 때..."
            maxlength="500"
          ></textarea>
          <div class="textarea-footer">
            <span id="char-count" class="char-count">0 / 500</span>
          </div>
        </div>

        <!-- 스타일 선택 -->
        <div class="card style-card">
          <div class="card-label">🎨 만화 스타일</div>
          <div class="style-grid" id="style-selector">
            <button class="style-btn active" data-style="shoujo">
              <span class="style-emoji">💜</span>
              <span class="style-name">애니메이션</span>
              <span class="style-desc">감성 순정만화</span>
            </button>
            <button class="style-btn" data-style="webtoon">
              <span class="style-emoji">🟦</span>
              <span class="style-name">웹툰</span>
              <span class="style-desc">한국 웹툰풍</span>
            </button>
            <button class="style-btn" data-style="disney">
              <span class="style-emoji">🏰</span>
              <span class="style-name">디즈니</span>
              <span class="style-desc">3D 애니메이션</span>
            </button>
          </div>
        </div>

        <!-- 컷 수 선택 -->
        <div class="card cuts-card">
          <div class="card-label">📖 컷 수</div>
          <div class="cuts-selector" id="cuts-selector">
            <button class="cut-btn" data-cuts="4">4컷</button>
            <button class="cut-btn active" data-cuts="6">6컷</button>
            <button class="cut-btn" data-cuts="8">8컷</button>
          </div>
        </div>

        <!-- 생성 버튼 -->
        <button class="btn-primary" id="btn-generate">
          <span class="btn-icon-emoji">✨</span>
          <span>만화 만들기</span>
        </button>
      </section>

      <!-- 최근 만화 -->
      <section class="recent-section" id="recent-section">
        <div class="section-title">📚 최근 만든 만화</div>
        <div id="recent-list" class="recent-list"></div>
      </section>

    </div>

    <!-- 로딩 화면 -->
    <div id="loading-screen" class="screen hidden">
      <div class="loading-content">
        <div class="loading-emoji">🌸</div>
        <div class="loading-steps">
          <div class="step" id="step-story">
            <span class="step-icon">⏳</span>
            <span class="step-text">스토리 분석 중...</span>
          </div>
          <div class="step" id="step-panels">
            <span class="step-icon">⏳</span>
            <span class="step-text">장면 구성 중...</span>
          </div>
          <div class="step" id="step-images">
            <span class="step-icon">⏳</span>
            <span class="step-text">이미지 생성 중...</span>
          </div>
        </div>
        <div class="loading-tip">💡 이미지 생성에 1~2분 정도 걸려요</div>
      </div>
    </div>

    <!-- 만화 뷰어 화면 -->
    <div id="viewer-screen" class="screen hidden">
      <header class="viewer-header">
        <button class="btn-back" id="btn-back">←</button>
        <div class="viewer-title" id="viewer-title"></div>
        <button class="btn-icon" id="btn-share">📤</button>
      </header>
      <div id="toon-viewer" class="toon-viewer"></div>
      <div class="viewer-footer">
        <button class="btn-secondary" id="btn-regenerate">🔄 다시 만들기</button>
        <button class="btn-primary" id="btn-save">💾 저장하기</button>
      </div>
    </div>

    <!-- 내 만화 목록 화면 -->
    <div id="library-screen" class="screen hidden">
      <header class="app-header">
        <button class="btn-back" id="btn-back-library">←</button>
        <div class="header-logo">📚 내 만화</div>
        <div></div>
      </header>
      <div id="library-list" class="library-list"></div>
    </div>

  </div>

  <!-- 토스트 메시지 -->
  <div id="toast" class="toast hidden"></div>

  <!-- 모듈 스크립트 -->
  <script type="module" src="main.js"></script>

</body>
</html>
